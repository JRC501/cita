<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cita Sábado</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F2EDE4;
    --paper-dark: #E9E1D2;
    --ink: #2B2622;
    --ink-soft: #6B6259;
    --terracotta: #C97B4A;
    --sage: #7E8F73;
    --line: #D8CFC0;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    background: var(--paper-dark);
    background-image:
      radial-gradient(circle at 1px 1px, rgba(43,38,34,0.06) 1px, transparent 0);
    background-size: 14px 14px;
    font-family: 'Space Grotesk', sans-serif;
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
  }

  body {
    padding: 32px 16px;
  }

  @media (prefers-reduced-motion: no-preference) {
    .ticket {
      animation: dropIn 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
  }

  @keyframes dropIn {
    from {
      opacity: 0;
      transform: translateY(-24px) rotate(0deg);
    }
    to {
      opacity: 1;
      transform: translateY(0) rotate(-1.1deg);
    }
  }

  .ticket-wrap {
    position: relative;
    max-width: 360px;
    width: 100%;
  }

  .ticket {
    position: relative;
    background: var(--paper);
    padding: 38px 30px 30px;
    transform: rotate(-1.1deg);
    box-shadow:
      0 1px 1px rgba(43,38,34,0.04),
      0 8px 16px rgba(43,38,34,0.10),
      0 24px 48px rgba(43,38,34,0.14);
  }

  .perf {
    position: absolute;
    left: 0;
    right: 0;
    height: 14px;
    background-image: radial-gradient(circle at 7px 7px, var(--paper-dark) 6px, transparent 6.5px);
    background-size: 14px 14px;
    background-repeat: repeat-x;
  }
  .perf-top { top: -7px; }
  .perf-bottom { bottom: -7px; }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-soft);
    text-align: center;
    margin: 0 0 4px;
  }

  .ticket-id {
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--ink-soft);
    text-align: center;
    margin: 0 0 22px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-optical-sizing: auto;
    font-weight: 600;
    font-size: 27px;
    line-height: 1.18;
    text-align: center;
    margin: 0 0 26px;
    color: var(--ink);
    letter-spacing: -0.01em;
  }

  h1 em {
    font-style: italic;
    font-weight: 400;
    color: var(--terracotta);
  }

  .divider {
    border: none;
    border-top: 1px dashed var(--line);
    margin: 22px 0;
  }

  .field-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }

  .field-row span:last-child {
    font-weight: 500;
    color: var(--ink);
    text-align: right;
  }

  .date-block {
    text-align: center;
    margin: 4px 0 2px;
  }

  .date-big {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 44px;
    line-height: 1;
    color: var(--ink);
    letter-spacing: -0.01em;
  }

  .time-big {
    font-size: 15px;
    letter-spacing: 0.06em;
    color: var(--terracotta);
    font-weight: 700;
    margin-top: 6px;
  }

  .countdown-label {
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-soft);
    text-align: center;
    margin: 0 0 12px;
  }

  .countdown {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 4px;
  }

  .cd-unit {
    background: var(--ink);
    color: var(--paper);
    border-radius: 3px;
    padding: 8px 4px 6px;
    min-width: 50px;
    text-align: center;
  }

  .cd-num {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    display: block;
  }

  .cd-tag {
    font-size: 8.5px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0.65;
    display: block;
    margin-top: 3px;
  }

  .note {
    text-align: center;
    font-size: 13.5px;
    line-height: 1.55;
    color: var(--ink);
    margin: 24px 0 4px;
  }

  .note strong {
    color: var(--sage);
  }

  .sig {
    text-align: center;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 600;
    font-size: 19px;
    color: var(--terracotta);
    margin-top: 16px;
  }

  .barcode {
    margin: 26px auto 0;
    height: 32px;
    width: 80%;
    background: repeating-linear-gradient(
      90deg,
      var(--ink) 0px, var(--ink) 2px,
      transparent 2px, transparent 5px,
      var(--ink) 5px, var(--ink) 6px,
      transparent 6px, transparent 10px,
      var(--ink) 10px, var(--ink) 13px,
      transparent 13px, transparent 16px
    );
    opacity: 0.85;
  }

  .barcode-label {
    text-align: center;
    font-size: 9.5px;
    letter-spacing: 0.18em;
    color: var(--ink-soft);
    margin-top: 6px;
  }

  .confirm-btn {
  display: block;
  text-align: center;
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-weight: 700;
  color: var(--paper);
  background: var(--sage);
  text-decoration: none;
  padding: 12px 16px;
  border-radius: 4px;
  margin: 18px 4px 0;
  transition: opacity 0.2s ease;
}

.confirm-btn:hover,
.confirm-btn:active {
  opacity: 0.85;
}

  .arrived {
    text-align: center;
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 20px;
    margin: 4px 0;
    color: var(--sage);
  }

  :focus-visible {
    outline: 2px solid var(--terracotta);
    outline-offset: 3px;
  }

  @media (max-width: 380px) {
    .ticket { padding: 32px 20px 24px; }
    .date-big { font-size: 38px; }
    .cd-unit { min-width: 42px; padding: 7px 3px 5px; }
    .cd-num { font-size: 18px; }
  }
</style>
</head>
<body>

  <div class="ticket-wrap">
    <div class="ticket" id="ticket">
      <div class="perf perf-top" aria-hidden="true"></div>
      <div class="perf perf-bottom" aria-hidden="true"></div>

      <p class="eyebrow">Ticket de reencuentro</p>
      <p class="ticket-id">N.º 0001 · válido una vez</p>

      <h1>Tengo una mesa<br>guardada <em>para ti</em></h1>

      <hr class="divider">

      <div class="field-row">
        <span>Para</span>
        <span>Axelitop</span>
      </div>
      <div class="field-row">
        <span>Punto de partida</span>
        <span>Tu casa</span>
      </div>
      <div class="field-row">
        <span>Destino</span>
        <span>Cargando...</span>
      </div>

      <hr class="divider">

      <div class="date-block">
        <div class="date-big">SÁB 20</div>
        <div class="time-big">JUNIO · 16:00 HRS</div>
      </div>

      <hr class="divider">

      <p class="countdown-label">Faltan</p>
      <div class="countdown" id="countdown" aria-live="polite">
        <div class="cd-unit">
          <span class="cd-num" id="cd-days">00</span>
          <span class="cd-tag">días</span>
        </div>
        <div class="cd-unit">
          <span class="cd-num" id="cd-hours">00</span>
          <span class="cd-tag">hrs</span>
        </div>
        <div class="cd-unit">
          <span class="cd-num" id="cd-mins">00</span>
          <span class="cd-tag">min</span>
        </div>
        <div class="cd-unit">
          <span class="cd-num" id="cd-secs">00</span>
          <span class="cd-tag">seg</span>
        </div>
      </div>

      <p class="note">Solo necesitas estar <strong>listo a las 4 pm</strong>.<br>Yo paso por ti.</p>

      <p class="sig">— Ión Reyes</p>

      <div class="barcode" aria-hidden="true"></div>
      <a href="https://wa.me/525530875496?text=Si%20acepto%20la%20salida%2C%20Juan.%20Te%20espero%20a%20las%204%3A00%20pm." class="confirm-btn" target="_blank" rel="noopener">CONFIRMAR ASISTENCIA</a>
    </div>
  </div>

  <script>
    const targetDate = new Date('2026-06-20T16:00:00');

    const daysEl = document.getElementById('cd-days');
    const hoursEl = document.getElementById('cd-hours');
    const minsEl = document.getElementById('cd-mins');
    const secsEl = document.getElementById('cd-secs');
    const countdownEl = document.getElementById('countdown');

    function pad(n) {
      return String(n).padStart(2, '0');
    }

    function renderArrived() {
      countdownEl.outerHTML = '<p class="arrived">Es hoy. Nos vemos a las 4. ☕</p>';
    }

    function tick() {
      const now = new Date();
      const diff = targetDate - now;

      if (diff <= 0) {
        renderArrived();
        clearInterval(timer);
        return;
      }

      const totalSeconds = Math.floor(diff / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const mins = Math.floor((totalSeconds % 3600) / 60);
      const secs = totalSeconds % 60;

      daysEl.textContent = pad(days);
      hoursEl.textContent = pad(hours);
      minsEl.textContent = pad(mins);
      secsEl.textContent = pad(secs);
    }

    tick();
    const timer = setInterval(tick, 1000);
  </script>
</body>
</html>
